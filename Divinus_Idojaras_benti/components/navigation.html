        <script defer data-name="navigation-logic">
          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const navToggle = document.getElementById("navToggle")
              const navClose = document.getElementById("navClose")
              const mobileOverlay = document.getElementById("mobileOverlay")
              const body = document.body

              const openMenu = () => {
                mobileOverlay.style.display = "flex"
                mobileOverlay.setAttribute("data-open", "true")
                navToggle.setAttribute("aria-expanded", "true")
                body.style.overflow = "hidden"
              }

              const closeMenu = () => {
                mobileOverlay.style.display = "none"
                mobileOverlay.setAttribute("data-open", "false")
                navToggle.setAttribute("aria-expanded", "false")
                body.style.overflow = ""
              }

              navToggle.addEventListener("click", openMenu)
              navClose.addEventListener("click", closeMenu)

              const mobileLinks = mobileOverlay.querySelectorAll(".navigation-mobile-link")
              mobileLinks.forEach((link) => {
                link.addEventListener("click", () => {
                  closeMenu()
                })
              })

              window.addEventListener("resize", () => {
                if (window.innerWidth > 767 && mobileOverlay.getAttribute("data-open") === "true") {
                  closeMenu()
                }
              })

              document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && mobileOverlay.getAttribute("data-open") === "true") {
                  closeMenu()
                }
              })
            })()
          });
        </script>
